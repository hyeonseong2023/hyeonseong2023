name: profile-stats

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/workflows/profile-stats.yml
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate the main stats card
        uses: cicirello/user-statistician@v1
        with:
          image-file: images/userstats.svg
          custom-title: "hyeon's GitHub stats"
          hide-keys: joined, featured, mostStarred, mostForked, followers, following, sponsors, sponsoring, watchedBy, templates, archived, private, languages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate the languages card
        uses: cicirello/user-statistician@v1
        with:
          image-file: images/languages.svg
          hide-keys: general, contributions, repositories
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
